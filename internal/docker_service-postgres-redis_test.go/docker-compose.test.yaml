version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: user_service_pg_test
    environment:
      POSTGRES_USER: users_tests
      POSTGRES_PASSWORD: users_tests
      POSTGRES_DB: users_tests
    ports:
      - "5434:5434"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users_tests"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: user_service_redis_test
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5